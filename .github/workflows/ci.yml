name: .NET CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # Восстановление всех проектов (без указания путей)
      - name: Restore dependencies
        run: dotnet restore

      # Сборка всего решения
      - name: Build
        run: dotnet build -c Release --no-restore

      # Запуск тестов (явно только тестовый проект)
      - name: Run tests
        run: dotnet test app.test/app.test.csproj -c Release --no-build --logger "trx"

      # Сохранение результатов тестов
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: "**/TestResults/*.trx"
